<html>

<head>
  <title>What's For Dinner</title>
  <link rel="icon" type="image/png" href="images/imgi_1_favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css/bootstrap.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="main.css/style.CSS">
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom py-3 m-1 mb-5">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <div class="logo-icon rounded-circle d-flex align-items-center justify-content-center">
          <i class="fa-solid fa-utensils text-white fs-5"></i>
        </div>
        <div class="ms-3">
          <h5 class="fw-bold mb-0 text-dark header-title">What's For Dinner</h5>
          <span class="text-muted d-block header-subtitle">Your daily meal inspiration</span>
        </div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="#" class="text-secondary fs-5 mx-2">
          <i class="fa-solid fa-bookmark"></i>
        </a>
        <a href="#" class="text-secondary fs-5 mx-2">
          <i class="fa-solid fa-clock-rotate-left"></i>
        </a>
        <a href="#" class="text-secondary fs-5 mx-2">
          <i class="fa-solid fa-gear"></i>
        </a>
        <div class="ms-2">
          <img src="images/avatar-4.jpg" class="rounded-circle border user-avatar" alt="avatar">
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-5 d-flex justify-content-center align-items-center min-vh-100">
    <div class="recipe-card bg-white shadow-lg border-0 overflow-hidden w-100 main-recipe-card">
      <div class="row g-0 h-100">

        <div class="col-12 col-md-5 position-relative text-white" id="image-section">
          <div class="img-container h-100 w-100">
            <img id="recipe-img" src="" alt="Recipe Image" class="w-100 h-100 object-fit-cover">
          </div>
          <div class="review-badge position-absolute top-0 start-0 m-4 px-3 py-2 rounded-pill bg-white text-dark shadow-sm fw-bold">
            <i class="fa-solid fa-star text-warning me-1"></i> <span id="recipe-review"></span>
          </div>
          <div class="time-bar position-absolute bottom-0 start-50 translate-middle-x mb-4 w-90 bg-white text-dark rounded-4 p-3 shadow text-center">
            <div class="row g-0">
              <div class="col-4 border-end">
                <i class="fa-solid fa-clock text-orange mb-1 d-block fs-5"></i>
                <span class="text-muted d-block time-label">Prep Time</span>
                <span id="recipe-prep" class="time-value fw-bold"></span>
              </div>
              <div class="col-4 border-end">
                <i class="fa-solid fa-fire-burner text-orange mb-1 d-block fs-5"></i>
                <span class="text-muted d-block time-label">Cook Time</span>
                <span class="fw-bold" id="recipe-cook" class="time-value"></span>
              </div>
              <div class="col-4">
                <i class="fa-solid fa-user-group text-primary mb-1 d-block fs-5"></i>
                <span class="text-muted d-block time-label">Servings</span>
                <span class="fw-bold" id="recipe-servings" class="time-value"></span>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-7 p-3 p-md-5 d-flex flex-column justify-content-between right-content-section">
          <div>
            <div id="recipe-categories" class="mb-3 d-flex gap-2"></div>

            <div class="d-flex justify-content-between align-items-start mb-2">
              <h1 id="recipe-name" class="fw-bold text-dark m-0 recipe-main-title"></h1>
              <div class="d-flex gap-2">
                <button class="btn btn-light rounded-3 text-orange action-btn shadow-sm icon-action-btn"><i class="fa-solid fa-bookmark fs-5"></i></button>
                <button class="btn btn-light rounded-3 text-orange action-btn shadow-sm icon-action-btn"><i class="fa-solid fa-share-nodes"></i></button>
              </div>
            </div>
            <p id="recipe-desc" class="text-muted mb-4 recipe-description"></p>

            <ul class="nav nav-tabs border-bottom mb-4 justify-content-between" id="recipeTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold text-secondary px-2 pb-2 fs-5" id="ingredients-tab" onclick="switchTab('ingredients')"><i class="fa-solid fa-list-ul me-1"></i> Ingredients</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold text-secondary px-2 pb-2 fs-5" id="instructions-tab" onclick="switchTab('instructions')"><i class="fa-solid fa-book-open me-1"></i> Instructions</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold text-secondary px-2 pb-2 fs-5" id="nutrition-tab" onclick="switchTab('nutrition')"><i class="fa-solid fa-chart-pie me-1"></i> Nutrition</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold text-secondary px-2 pb-2 fs-5" id="tips-tab" onclick="switchTab('tips')"><i class="fa-solid fa-circle-check me-1"></i> Chef's Tips</button>
              </li>
            </ul>

            <div class="tab-content-container">
              <div id="dynamic-tab-content"></div>
            </div>
          </div>

          <div class="mt-4 pt-3 border-top d-flex justify-content-start">
            <button class="btn btn-orange text-white fw-bold shadow-sm transition" id="random-btn">
              <i class="fa-solid fa-arrows-rotate me-2"></i> Try Another Recipe
            </button>
          </div>

        </div>

      </div>
    </div>
  </div>
  <script src="js/bootstrap.bundle.js"></script>
  <script src="js/index.js"></script>
</body>

</html>
